name: Build APK

on:
  push:
    branches: [ main ]
    branches: [pre-release]
  release:
    types: [ created ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Generate gradlew
        run: gradle wrapper --gradle-version 8.2
        
      - name: Build Release APK
        run: ./gradlew assembleRelease
        
      - name: Prepare for release 
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY }}
          KEYSTORE_PASS: ${{ secrets.KEY_STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > my.keystore
          
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          
          $BUILD_TOOLS_DIR/zipalign -v -p 4 app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
          
          $BUILD_TOOLS_DIR/apksigner sign --ks my.keystore --ks-pass env:KEYSTORE_PASS --ks-key-alias "$ALIAS" --key-pass env:KEY_PASS --out ForceSystemFont.apk aligned.apk
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForceSystemFont-Release
          path: ForceSystemFont.apk
          
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ForceSystemFont.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
