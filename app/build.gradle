plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.forcesystemfont'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.forcesystemfont"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://api.xposed.info/' }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
